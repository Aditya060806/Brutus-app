name: brutus_app
description: "Brutus AI — Mobile Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State & DI
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.3

  # Auth
  google_sign_in: ^6.2.2
  local_auth: ^2.3.0

  # Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  fl_chart: ^0.70.2
  iconsax_flutter: ^1.0.0+1
  flutter_staggered_animations: ^1.1.1

  # Audio — Phase 2 pipeline
  record: ^6.0.0          # PCM streaming to Gemini (6.x fixed record_linux interface)
  permission_handler: ^11.4.0
  flutter_tts: ^4.2.0     # Text-to-speech for Brutus responses (REST fallback only)

  # Robot — BLE (HM-10 module via flutter_blue_plus, replaces old HC-05 classic BT stack)
  flutter_blue_plus: ^2.3.4

  # Vision — Phase 2.5 (Gemini multimodal input)
  camera: ^0.11.0+2       # camera preview + JPEG frame capture for vision mode

  # Maps & Location
  geolocator: ^13.0.2

  # Gmail / Google APIs
  googleapis: ^14.0.0
  googleapis_auth: ^1.6.0

  # Data
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  http: ^1.3.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  flutter_markdown: ^0.7.6

  # Phase 3 — Web Search · Deep Research · RAG Oracle
  file_picker: ^10.3.3     # txt/md import for the Oracle library

  # Phase 3 finish — Email · Gallery · Maps
  flutter_map: ^7.0.2      # OpenStreetMap tile renderer (no API key required)
  latlong2: ^0.9.1         # LatLng type used by flutter_map

  # Phase 4 — Phone Automation
  android_intent_plus: ^5.3.0           # Launch Settings panels + custom intents
  installed_apps: ^2.1.1                # Enumerate installed apps for app launcher
  torch_light: ^1.1.0                   # CameraManager-based flashlight toggle
  notification_listener_service: ^0.3.5 # Read posted notifications (with permission)
  google_mlkit_text_recognition: ^0.13.1 # On-device OCR for "read the screen" voice tool
  google_mlkit_face_detection: ^0.11.1   # On-device face detection for "eye tracking" (phone cam → robot eyes)
  flutter_contacts: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
